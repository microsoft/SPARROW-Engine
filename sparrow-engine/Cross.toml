# cross-rs configuration for RP-38 spe-mobile benchmark binaries.
#
# Target: aarch64-unknown-linux-gnu (Pi Zero 2W, ARMv8 Cortex-A53, Trixie/Bookworm
# aarch64 userland with glibc >= 2.36).
#
# We extend the default cross images with the system libs the ORT and TFLite Rust
# bindings need at link/build time (clang for bindgen, pkg-config, libssl-dev for
# any reqwest fallbacks). The ORT shared library itself is supplied at runtime
# via load-dynamic and is NOT linked at build time, so no aarch64 ORT artifact is
# required in the cross image.

[target.aarch64-unknown-linux-gnu]
image = "ghcr.io/cross-rs/aarch64-unknown-linux-gnu:main"
pre-build = [
    "dpkg --add-architecture arm64",
    "apt-get update",
    # bindgen requires libclang >= 9; the default image's `clang` package is
    # libclang 3.8 (too old). Install LLVM 14 from the distro's repo.
    "apt-get install --assume-yes --no-install-recommends pkg-config clang-14 libclang-14-dev",
    # bindgen looks up libclang via LIBCLANG_PATH or by default in /usr/lib/llvm-*/lib.
    "ln -sf /usr/lib/llvm-14/lib/libclang.so /usr/lib/libclang.so",
]

[build]
default-target = "aarch64-unknown-linux-gnu"
[build.env]
passthrough = ["LITERT_LIB_DIR"]
volumes = [
    "/home/miao/repos/PW_refactor/sparrow-engine-dev/bench-binaries/artifacts:/home/miao/repos/PW_refactor/sparrow-engine-dev/bench-binaries/artifacts:ro",
]

[target.aarch64-unknown-linux-gnu.env]
passthrough = ["LITERT_LIB_DIR"]
volumes = [
    "/home/miao/repos/PW_refactor/sparrow-engine-dev/bench-binaries/artifacts:/home/miao/repos/PW_refactor/sparrow-engine-dev/bench-binaries/artifacts:ro",
]
