# Sparrow Model Zoo — catalog (single source of truth)
#
# This file is THE authoritative list of models in the zoo. The downloader
# (download_models.sh), the README model table, and sibling projects
# (sparrow-data, sparrow-ops) all read THIS file rather than hardcoding model
# lists. Add a model = add one [[model]] block here.
#
# Taxonomy: domain (camera_trap | acoustics | overhead | general) x
#           task (detector | classifier | encoder | cascade).
# `format` distinguishes what the artifact is:
#   onnx    — desktop model, loadable by spe / server / Python (ONNX Runtime).
#   tflite  — mobile-only variant, loaded by sparrow-engine-mobile, NOT desktop.
#   cascade — a small pipeline descriptor referencing other models (no weights).
# `download_models.sh` fetches ONLY `format = "onnx"` models by default; tflite
# and cascade artifacts are fetched on demand (named explicitly or via --all).
#
# Zenodo stores per-model ZIPs named "<domain>__<task>__<id>.zip" (Zenodo has no
# real folders; the "__" delimiter groups them when the file list is sorted).
# Each ZIP unpacks to "<id>/" so the engine resolves models by flat id under the
# models dir.
#
# Versioning policy: latest-version-only for internal dev iterations; flagship
# families (MegaDetector) keep ALL versions. Superseded versions are dropped
# from new bundles but remain on their original immutable DOI.
#
# `alias` lists prior ids a model was known by, so consumers pinned to an old
# name still resolve (e.g. MDV5a was "Species_Net_MDV5a" before v0.10.0).

schema_version = "1.0"

[zenodo]
record = "21213417"
concept_doi = "10.5281/zenodo.20348978"
version = "0.17.0"

